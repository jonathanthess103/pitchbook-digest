name: fetch-deals

on:
  schedule:
    # Newsletter arrives 11:00-12:00 UTC; routine fires at 13:30 UTC.
    # 12:00 run catches it every time; 12:30 and 13:00 are safety nets.
    # Each run no-ops if deals.json is already current.
    - cron: '0 12 * * 1-5'   # 5:00am PDT / 8:00am EDT
    - cron: '30 12 * * 1-5'  # 5:30am PDT / 8:30am EDT
    - cron: '0 13 * * 1-5'   # 6:00am PDT / 9:00am EDT
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run fetch-deals.js
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node fetch-deals.js

      - name: Commit deals.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet deals.json; then
            echo "No change to deals.json"
          else
            git add deals.json
            git commit -m "chore: update deals.json ($(date -u +%Y-%m-%d))"
            git push
          fi
