name: fetch-deals

on:
  schedule:
    # GitHub schedules for low-activity repos can be delayed 1-6+ hours.
    # Runs are spread across the day so at least one lands before the
    # routine fires at 20:00 UTC (4pm ET). Each run no-ops if deals.json
    # is already current.
    - cron: '0 12 * * 1-5'   # 8:00am EDT  (may run as late as ~18:00 UTC)
    - cron: '30 12 * * 1-5'  # 8:30am EDT
    - cron: '0 13 * * 1-5'   # 9:00am EDT
    - cron: '0 14 * * 1-5'   # 10:00am EDT
    - cron: '0 15 * * 1-5'   # 11:00am EDT
    - cron: '0 16 * * 1-5'   # 12:00pm EDT
    - cron: '0 17 * * 1-5'   # 1:00pm EDT
    - cron: '0 18 * * 1-5'   # 2:00pm EDT
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run fetch-deals.js
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node fetch-deals.js

      - name: Commit deals.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet deals.json; then
            echo "No change to deals.json"
          else
            git add deals.json
            git commit -m "chore: update deals.json ($(date -u +%Y-%m-%d))"
            git push
          fi
